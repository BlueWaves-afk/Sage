# SAGE frontend nginx — serves the SPA and proxies API/WebSocket to the gateway.
# Mirrors the Vite dev proxy (/api, /health, /ws → api-gateway:8000).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for the JS/CSS bundles (deck.gl + maplibre are large).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # REST API → FastAPI gateway.
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
    }

    # WebSocket channels (/ws live push, /ws/voice bridge).
    location /ws {
        proxy_pass http://api-gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — client-side routing (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
