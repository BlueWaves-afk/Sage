version: "3.9"

# SAGE — local development stack
#
# Quick start:
#   cp .env.example .env          # edit LLM_PROVIDER and API keys as needed
#   docker compose up falkordb redis -d   # start infrastructure first
#   docker compose up sage-core api-gateway   # start the KB + API
#   open http://localhost:8000/health   # should return {"status":"ok","kb_ready":true}
#   open http://localhost:3000          # FalkorDB browser to inspect the graph
#
# Default: LLM_PROVIDER=stub (no credentials needed).
# To use OpenAI: set LLM_PROVIDER=openai and OPENAI_API_KEY in .env
# To use AWS Bedrock: set LLM_PROVIDER=bedrock and AWS_* in .env

x-common-env: &common-env
  env_file:
    - .env
    - path: .env.local   # real API keys (gitignored); overrides .env
      required: false

x-kb-build: &kb-build
  build:
    context: .
    dockerfile: docker/api_gateway.Dockerfile

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    volumes:
      # Graph + vector store persisted under knowledge/ so the system's memory is co-located.
      - ./knowledge/graph_store:/var/lib/falkordb/data
    ports:
      - "6379:6379"
      - "3000:3000"     # FalkorDB browser — inspect graph at http://localhost:3000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"     # exposed as 6380 locally to avoid clash with falkordb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── SAGE Core ───────────────────────────────────────────────────────────────
  # Runs the ingest consumer loop + risk monitor.
  # Owns the /wiki volume.

  sage-core:
    build:
      context: .
      dockerfile: docker/sage_core.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      FALKORDB_HOST: falkordb
      REDIS_URL: redis://redis:6379/0
      WIKI_DIR: /app/wiki
      SAGE_BUNDLE_PATH: data/india-energy-2026.context   # bind-mounted to ./knowledge/wiki (single source on host)
    volumes:
      - ./knowledge/wiki:/app/wiki
      - ./data:/app/data:ro          # context bundle
    depends_on:
      falkordb: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ── API Gateway (System 5 backend) ──────────────────────────────────────────
  # FastAPI + WebSocket. The only port exposed to the host (besides FalkorDB browser).

  api-gateway:
    build:
      context: .
      dockerfile: docker/api_gateway.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      FALKORDB_HOST: falkordb
      REDIS_URL: redis://redis:6379/0
      WIKI_DIR: /app/wiki
      SAGE_BUNDLE_PATH: data/india-energy-2026.context
    volumes:
      - ./knowledge/wiki:/app/wiki   # shares wiki dir with sage-core
      - ./data:/app/data:ro          # context bundle (host = single source)
    depends_on:
      falkordb: { condition: service_healthy }
      redis:    { condition: service_healthy }
      sage-core: { condition: service_started }
    ports:
      - "8000:8000"

  # ── Sensory Agent sub-agents (System 1) ────────────────────────────────────
  # Each pushes NormalizedSignal to Redis; sage-core consumes.
  # All disabled by default — enable individually as you implement them.

  sensory-ais:
    build:
      context: .
      dockerfile: docker/sensory_ais.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:     { condition: service_healthy }
      sage-core: { condition: service_started }
    profiles: ["sensory"]   # only starts with: docker compose --profile sensory up

  sensory-news:
    build:
      context: .
      dockerfile: docker/sensory_news.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:     { condition: service_healthy }
      sage-core: { condition: service_started }
    profiles: ["sensory"]

  sensory-sanctions:
    build:
      context: .
      dockerfile: docker/sensory_sanctions.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:     { condition: service_healthy }
      sage-core: { condition: service_started }
    profiles: ["sensory"]

  sensory-prices:
    build:
      context: .
      dockerfile: docker/sensory_prices.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:     { condition: service_healthy }
      sage-core: { condition: service_started }
    profiles: ["sensory"]

  # ── Scenario Agent (System 2) ───────────────────────────────────────────────

  scenario-agent:
    build:
      context: .
      dockerfile: docker/scenario_agent.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      FALKORDB_HOST: falkordb
      REDIS_URL: redis://redis:6379/0
    depends_on:
      sage-core: { condition: service_started }
    profiles: ["agents"]

  # ── Procurement + Reserve Agents (Systems 3 + 4) ────────────────────────────

  alt-procurement-agent:
    build:
      context: .
      dockerfile: docker/alt_procurement_agent.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      FALKORDB_HOST: falkordb
      REDIS_URL: redis://redis:6379/0
    depends_on:
      sage-core: { condition: service_started }
    profiles: ["agents"]

  reserve-optim-agent:
    build:
      context: .
      dockerfile: docker/reserve_optim_agent.Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      FALKORDB_HOST: falkordb
      REDIS_URL: redis://redis:6379/0
    depends_on:
      sage-core: { condition: service_started }
    profiles: ["agents"]

  # ── Frontend (System 5 UI) — nginx serving the built React/deck.gl SPA ───────
  # Proxies /api, /health, /ws to api-gateway:8000. Exposed on host port 80.
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      api-gateway: { condition: service_started }
    ports:
      - "80:80"

