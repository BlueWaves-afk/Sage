# ── Estimation methods ───────────────────────────────────────────────────────
# Rows with tier=derived or estimated reference one of these as their `source`.
# This is what makes "no simulated data" auditable: every non-real value states
# exactly how it was produced.
estimation_methods:
  DERIVED-import-volume:
    method: PPAC national import share × 244.5 MT total ÷ 7.33 bbl/tonne ÷ 365 days = mbpd
    tier:   derived
  DERIVED-share:
    method: India ~42% Hormuz dependence (PPAC import-by-source × maritime geography)
    tier:   derived
  DERIVED-compat:
    method: Refinery Nelson Complexity Index × crude assay API/sulfur match (Peng-Robinson proxy)
    tier:   derived
  EST-allocation:
    method: Port→refinery share estimated from co-location; operator allocation not published
    tier:   estimated
  EST-inventory:
    method: India national average crude inventory ~22 days (PPAC) applied uniformly; per-refinery not published
    tier:   estimated
  EST-spr:
    method: National SPR fill ~40% (ISPRL Mar 2025) distributed proportionally; per-site not published
    tier:   estimated
  EST-congestion:
    method: Static baseline 0.0; live value derived from AIS vessel density at runtime
    tier:   estimated
  DERIVED-price-elasticity:
    method: >
      $/bbl per mbpd of NET global shortfall, from historical elasticity (≈10% global
      supply loss → Brent ~$120, i.e. ~$4.5/bbl/mbpd); convex band 3.5–6.0. Refs: Fed
      IFDP 1173, IMF WP/17-15.
    tier:   derived
  EST-spr-draw:
    method: ISPRL emergency SPR pumping-rate estimate (no published per-cavern rate)
    tier:   estimated
  EST-bypass-ramp:
    method: Aramco operations estimate for time to ramp Petroline/ADCOP to capacity
    tier:   estimated
  EST-sector-other:
    method: Residual petroleum products not in named sectors
    tier:   estimated
  standard-finance:
    method: Annual discount rate 10.5% → daily factor 0.97 (r_daily = (1+r_annual)^(1/365) - 1 ≈ 0.97)
    tier:   derived

# ── Bundle contents ──────────────────────────────────────────────────────────
# Two layers:
#   facts/      structured ground-truth values → written directly as graph attributes
#               (deterministic; not reconciled by the LLM — you don't fuzz known numbers)
#   narratives/ per-entity prose with [[wikilinks]] → routed through the synthesis path
#               (render_wiki_page → wiki store + reconciled episode → graph + vector)
#               Entities without a narrative file get a foundational stub generated from facts.
nodes:
  - {type: Corridor,   file: facts/nodes/corridors.csv}
  - {type: Supplier,   file: facts/nodes/suppliers.csv}
  - {type: Refinery,   file: facts/nodes/refineries.csv}
  - {type: CrudeGrade, file: facts/nodes/crude_grades.csv}
  - {type: Port,       file: facts/nodes/ports.csv}
  - {type: SPRCavern,  file: facts/nodes/spr_caverns.csv}
  - {type: Authority,  file: facts/nodes/authorities.csv}
  - {type: GeoEvent,   file: facts/nodes/geo_events.csv}
edges:
  - {type: EXPORTS_VIA,    file: facts/edges/exports_via.csv}
  - {type: FEEDS,          file: facts/edges/feeds.csv}
  - {type: SUPPLIES,       file: facts/edges/supplies.csv}
  - {type: CONFIGURED_FOR, file: facts/edges/configured_for.csv}
  - {type: BYPASS_ROUTE,   file: facts/edges/bypass_routes.csv}

# Model parameters — sourced, provenance-tracked, swappable per-bundle.
# All systems read from these files; nothing is hardcoded in agent code.
params_file:          params/ario_params.csv       # System 2 ARIO economic coefficients
sectors_file:         params/sectors.csv            # System 2 IO sectoral weights
routing_params_file:  params/routing_params.csv     # System 3 VLCC costs/lead times/war-risk
ranking_params_file:  params/ranking_params.csv     # System 3 TOPSIS criterion weights
spr_params_file:      params/spr_params.csv         # System 4 SDP/CMDP constants + p_resolve
grade_params_file:    params/grade_params.csv       # System 3 grade compatibility tolerances
heuristic_params_file: params/heuristic_params.csv  # Orchestration heuristic thresholds
economics_params_file: params/economics_params.csv  # Shared baseline economics (Brent, daily consumption, risk filters)

# Refresh contract: the subset of values that drift SUB-ANNUALLY and are only safe as
# static defaults because System 1 overrides them live. A yearly commit is enough for
# everything EXCEPT the rows listed here. See DATA_PROVENANCE.md §Refresh contract.
volatile_registry_file: params/volatile_defaults.csv

# Narratives are auto-discovered from narratives/*.md (filename = entity_id).
# Each carries frontmatter: entity_id, source_url, as_of, tier.
narratives_dir: narratives

# Source evidence for RAG-grounded synthesis. fetch_sources.py reads sources_index.csv
# (entity_id, url, note), fetches each URL, and writes sources/<entity_id>.md. At
# instantiate time the LLM summarises THIS cached text (+ facts) — it does not write
# from parametric memory — which is what prevents hallucination.
sources_dir: sources
