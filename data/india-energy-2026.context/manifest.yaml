# ─────────────────────────────────────────────────────────────────────────────
# SAGE Context Bundle Manifest
#
# A context bundle is SAGE's foundational knowledge snapshot — the geopolitical
# relationships and graph values the system is instantiated with, BEFORE any live
# signals arrive. Analogous to loading pretrained weights: SAGE.instantiate(bundle).
#
# Swap this bundle for a newer/region-specific one to re-base the system's worldview.
# ─────────────────────────────────────────────────────────────────────────────

bundle_id:      india-energy-2026
name:           India Energy Supply Chain — 2026
schema_version: 1.0.0
bundle_version: 1.1.0          # bump on any structural change; upgrade.py diffs on this
previous_version: null          # set to prior bundle_id on upgrade (e.g. india-energy-2025)
domain:         oil-supply-chain
region:         India
vintage:        2026
created:        2026-07-02

# ── Upgrade policy ────────────────────────────────────────────────────────────
# STRUCTURAL layers (facts/, params/, io/) are REPLACED on upgrade.
# DYNAMIC layers (RISK_STATE edges, GeoEvent nodes, episodes, wiki narratives
#   written by System 1) are PRESERVED — upgrade.py never deletes them.
# Wiki pages for changed entities are re-synthesized with a "## Context Update" note.
# Run: python3.11 -m knowledge.context.upgrade <new_bundle_path>
upgrade_policy:
  replace:  [facts, params, io]
  preserve: [risk_state_edges, geo_events, vessel_nodes, episodes, wiki_dynamic]
  resynthesise_on_change: true
description: >
  Foundational static knowledge for India's crude oil supply chain: maritime
  corridors, suppliers, refineries, crude grades, ports, strategic reserves, and
  the structural relationships between them. All values sourced from public data;
  fields with no public source are tagged with an estimation_method.
  Full per-value provenance (real/derived/estimated + source links) is documented
  in DATA_PROVENANCE.md alongside this manifest.

# ── Provenance tiers ─────────────────────────────────────────────────────────
# Every node/edge row carries a `tier` and a `source` key (resolved below).
#   real      — exact published value from an authoritative source
#   derived   — computed from real aggregates via a documented method
#   estimated — no public source exists; documented estimate (see estimation_methods)
tiers: [real, derived, estimated]

