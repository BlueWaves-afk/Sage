name: Build & Push to ECR

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 203800220566.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          # OIDC preferred; falls back to stored secrets if OIDC not configured
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build & push sage-core
        run: |
          docker build -f docker/api_gateway.Dockerfile -t $ECR_REGISTRY/sage/sage-core:$IMAGE_TAG .
          docker push $ECR_REGISTRY/sage/sage-core:$IMAGE_TAG
          docker tag $ECR_REGISTRY/sage/sage-core:$IMAGE_TAG $ECR_REGISTRY/sage/sage-core:latest
          docker push $ECR_REGISTRY/sage/sage-core:latest

      - name: Build & push api-gateway
        run: |
          docker build -f docker/api_gateway.Dockerfile -t $ECR_REGISTRY/sage/api-gateway:$IMAGE_TAG .
          docker push $ECR_REGISTRY/sage/api-gateway:$IMAGE_TAG
          docker tag $ECR_REGISTRY/sage/api-gateway:$IMAGE_TAG $ECR_REGISTRY/sage/api-gateway:latest
          docker push $ECR_REGISTRY/sage/api-gateway:latest

      - name: Build & push frontend
        run: |
          docker build -f docker/frontend.Dockerfile -t $ECR_REGISTRY/sage/frontend:$IMAGE_TAG .
          docker push $ECR_REGISTRY/sage/frontend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/sage/frontend:$IMAGE_TAG $ECR_REGISTRY/sage/frontend:latest
          docker push $ECR_REGISTRY/sage/frontend:latest

      - name: Build & push sensory agents
        run: |
          for agent in ais news sanctions prices; do
            docker build -f docker/sensory_${agent}.Dockerfile \
              -t $ECR_REGISTRY/sage/sensory-${agent}:$IMAGE_TAG .
            docker push $ECR_REGISTRY/sage/sensory-${agent}:$IMAGE_TAG
            docker tag $ECR_REGISTRY/sage/sensory-${agent}:$IMAGE_TAG \
              $ECR_REGISTRY/sage/sensory-${agent}:latest
            docker push $ECR_REGISTRY/sage/sensory-${agent}:latest
          done

      - name: Build & push scenario-agent
        run: |
          docker build -f docker/scenario_agent.Dockerfile -t $ECR_REGISTRY/sage/scenario-agent:$IMAGE_TAG .
          docker push $ECR_REGISTRY/sage/scenario-agent:$IMAGE_TAG

      - name: Build & push reserve-optim-agent
        run: |
          docker build -f docker/reserve_optim_agent.Dockerfile -t $ECR_REGISTRY/sage/reserve-optim-agent:$IMAGE_TAG .
          docker push $ECR_REGISTRY/sage/reserve-optim-agent:$IMAGE_TAG
